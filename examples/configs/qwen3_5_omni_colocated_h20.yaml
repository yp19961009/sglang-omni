# SPDX-License-Identifier: Apache-2.0
#
# Example single-H20 colocated Qwen3.5-Omni launcher config.
# The Python pipeline config owns the stage topology; this file only sets the
# runtime memory budgets needed for colocated launch.
#
# Conservative initial config for single-H20 colocated serving. AR concurrency
# defaults to max_running_requests=32; recalibrate it against real peak memory
# before production benchmarking.

config_cls: Qwen35OmniSpeechColocatedPipelineConfig
name: qwen3-5-omni-colocated-h20
model_path: Qwen/Qwen3.5-Omni
relay_backend: shm

stage_overrides:
  preprocessing:
    runtime:
      image_max_pixels: 401408
      video_fps: 2
      video_max_frames: 128
      video_min_frames: 4
      video_max_pixels: 401408
      # These values follow the Qwen3OmniNextProcessor online defaults.
      # Request-level parameters with the same names override these service defaults.
      audio_target_sr: 16000
      audio_timestamp_interval: 60
      audio_downsample_times: 4
      audio_downsample_chunk_size: 100

  image_encoder:
    runtime:
      resources:
        total_gpu_memory_fraction: 0.025

  audio_encoder:
    runtime:
      resources:
        total_gpu_memory_fraction: 0.025

  thinker:
    runtime:
      resources:
        total_gpu_memory_fraction: 0.75
      sglang_server_args:
        max_running_requests: 32

  talker_ar:
    runtime:
      resources:
        total_gpu_memory_fraction: 0.12
      sglang_server_args:
        max_running_requests: 32

  code2wav:
    # Qwen3.5 code2wav defaults stream_chunk_size to 4; this H20 config
    # explicitly overrides it to 8. Use --code2wav-stream-chunk-size for A/B
    # testing during real benchmarks.
    runtime:
      send_chunk_size: 8
      code2wav_enable_torch_compile: true
      code2wav_odeint_method: rk4
      code2wav_odeint_method_relaxed: true
      code2wav_frequency: 50hz
      code2wav_dit_quant: fp8
      resources:
        total_gpu_memory_fraction: 0.02
